services:

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: php-image
    working_dir: /var/www
    volumes:
      - ./application:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - "./application:/var/www"
      - "./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      - php

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: products_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
